<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>תרגיל לולאות</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/dracula.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/xml/xml.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/css/css.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/htmlmixed/htmlmixed.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/runmode/runmode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="wrapper.css">
</head>
<body>
  <div id="wrapper-container">

    <div id="editor-panel">
      <div id="tabs">
        <button class="tab readonly active" data-file="instructions.md">README.md <span id="instructions-mode-switch"><span id="code-icon" title="הצג קוד">&#x1F512;</span><span id="read-icon" class="active" title="מצב קריאה">&#x1F441;</span></span></button>
        <button class="tab readonly" data-file="index.html">index.html &#x1F512;</button>
        <button class="tab readonly" data-file="style.css">style.css &#x1F512;</button>
        <button class="tab readonly" data-file="script.js">script.js &#x1F512;</button>
        <button class="tab exercise" data-file="emojis.js">emojis.js</button>
        <button class="tab exercise" data-file="shapes.js">shapes.js</button>
      </div>
      <div id="editor-container">
        <div id="editors-container"></div>
        <div id="instructions-rendered"></div>
      </div>
      <div id="editor-footer">
        <button id="ai-btn" title="עזרה מ-AI">✨</button>
        <div id="mode-control">
          <div id="mode-my-code-group">
            <div id="play-pause-group">
              <span id="play-btn">&#x25B6;</span>
              <span id="pause-btn">&#x23F8;</span>
            </div><span id="mode-my-code">הצג והרץ<br>קוד שלי</span>
          </div>
          <span id="mode-solution" class="active">הצג והרץ<br>קוד פתרון</span>
        </div>
      </div>
    </div>

    <div id="splitter"></div>

    <div id="preview-panel">
      <iframe id="preview" sandbox="allow-scripts allow-same-origin"></iframe>
      <div id="ai-panel" dir="rtl">
        <div id="ai-header">
          <span>עזרה ✨</span>
          <button id="ai-close">✕</button>
        </div>
        <div id="ai-messages"></div>
        <div id="ai-input-area">
          <textarea id="ai-input" placeholder="שאל שאלה..." rows="3"></textarea>
          <button id="ai-send">שלח</button>
        </div>
      </div>
    </div>

  </div>

  <script src="ai/ai_config.js"></script>
  <script src="wrapper.js"></script>
  <script src="ai/ai.js"></script>
</body>
</html>
